services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:17
    container_name: exam-saas-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-exam_saas}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: exam-saas-redis
    ports:
      - '6380:6379'
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: exam-saas-nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
