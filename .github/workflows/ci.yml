name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + typecheck + test + build)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exam_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/exam_saas_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      JWT_SECRET: ci-jwt-secret-do-not-use-in-prod
      REFRESH_SECRET: ci-refresh-secret-do-not-use-in-prod
      SEED_ADMIN_EMAIL: ci-admin@test.local
      SEED_ADMIN_PASSWORD: CiPassword123

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 && break
            sleep 2
          done
      - name: Wait for Redis
        run: |
          for i in $(seq 1 30); do
            redis-cli -h localhost ping | grep -q PONG && break
            sleep 2
          done

      - name: Prisma Migrate
        run: npx prisma migrate deploy

      - name: Prisma Generate
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test
        run: npx jest --coverage

      - name: Build
        run: pnpm build

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/.next
          retention-days: 7

  e2e:
    name: E2E (Playwright H5 student flow)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: exam_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/exam_saas_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      JWT_SECRET: ci-jwt-secret-do-not-use-in-prod
      REFRESH_SECRET: ci-refresh-secret-do-not-use-in-prod
      SEED_ADMIN_EMAIL: ci-admin@test.local
      SEED_ADMIN_PASSWORD: CiPassword123
      PORT: '4000'
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_DEFAULT_TENANT_ID: 11111111-1111-1111-1111-111111111111
      E2E_EXAM_CODE: '999999'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Prisma Generate
        working-directory: ./backend
        run: npx prisma generate

      - name: Seed test DB
        working-directory: ./backend
        run: |
          npx prisma migrate deploy
          # Insert minimal E2E fixture directly via SQL — bypasses ts-node
          # + Prisma 7's value-import resolution issue (PrismaClient only
          # re-exported as type from the root @prisma/client entry under
          # Prisma 7's exports map).
          PGPASSWORD=postgres psql -h localhost -U postgres -d exam_saas_test <<'SQL'
            INSERT INTO "tenants" (id, name, "createdAt", "updatedAt")
              VALUES ('11111111-1111-1111-1111-111111111111', 'E2E 租户', NOW(), NOW())
              ON CONFLICT (id) DO NOTHING;
            INSERT INTO "users" (id, "tenantId", email, name, "passwordHash", role,
                                 "createdAt", "updatedAt")
              VALUES ('44444444-4444-4444-4444-444444444444',
                      '11111111-1111-1111-1111-111111111111',
                      'e2e-admin@test.local', 'E2E 管理员',
                      '$2b$12$abcdefghijklmnopqrstuuABCDEFGHIJKLMNOPQRSTUVWXYZ012',
                      'ADMIN', NOW(), NOW())
              ON CONFLICT (id) DO NOTHING;
            INSERT INTO "question_banks" (id, "tenantId", name, "createdAt", "updatedAt")
              VALUES ('22222222-2222-2222-2222-222222222222',
                      '11111111-1111-1111-1111-111111111111', 'E2E 题库', NOW(), NOW())
              ON CONFLICT (id) DO NOTHING;
            INSERT INTO "exams" (id, "tenantId", title, "timeLimit", "passScore",
                                 status, "accessCode", "createdBy", "createdAt", "updatedAt")
              VALUES ('33333333-3333-3333-3333-333333333333',
                      '11111111-1111-1111-1111-111111111111',
                      'E2E 测试', 30, 60, 'PUBLISHED', '999999',
                      '44444444-4444-4444-4444-444444444444', NOW(), NOW())
              ON CONFLICT (id) DO NOTHING;
          SQL

      - name: Start backend (prod)
        working-directory: ./backend
        run: |
          pnpm build
          node dist/main.js &
          BACKEND_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/api/v1/health && break
            sleep 2
          done

      - name: Build + start web (prod)
        working-directory: ./web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
          NEXT_PUBLIC_DEFAULT_TENANT_ID: 11111111-1111-1111-1111-111111111111
          E2E_EXAM_CODE: '999999'
        run: |
          pnpm build
          (npx next start -p 3000 &) 2>/dev/null
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/login && break
            sleep 2
          done

      - name: Install Playwright browsers
        working-directory: ./web
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        working-directory: ./web
        run: pnpm test:e2e

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            web/test-results/
            web/playwright-report/
          retention-days: 7
